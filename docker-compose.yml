services:
  # 1. The Object Storage
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 2. The Graph Database
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474" # Browser
      - "7687:7687" # Bolt connection
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  # 3. YOUR Backend API (NEW)
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - MINIO_ENDPOINT_URL=http://minio:9000
    depends_on:
      - neo4j
      - minio
    volumes:
      - ./backend:/app # Map code for hot-reloading
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 4. YOUR Frontend Dashboard (NEW)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Don't overwrite container modules with host ones
    command: npm run dev

volumes:
  minio_data:
  neo4j_data:
